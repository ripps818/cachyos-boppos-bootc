---
name: Build container image (v3)
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "30 06 * * SUN" # 06:30am UTC on sunday
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Force a clean build (--no-cache)'
        required: false
        type: boolean
        default: false

env:
  IMAGE_DESC: "CachyOS BoppOS Bootc image"
  IMAGE_KEYWORDS: "bootc,arch,cachyos"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/10499845?s=200&v=4"
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "v3"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push image (v3)
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          # Lowercase the image uri
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Check Compatibility (v3)
        id: check_compatibility
        run: |
          # Check for x86-64-v3 support (AVX2 is a good proxy for v3 base)
          if ! grep -q avx2 /proc/cpuinfo; then
            echo "::error::Runner CPU does not support x86-64-v3 (AVX2 missing). Failing as requested."
            echo "should_skip=true" >> $GITHUB_OUTPUT # Set an output variable
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Free disk space
        uses: hastd/free-disk-space@68572aeaadb7f76bd408246328e95926323402b5 # v0.1.2

      - name: Get current date
        id: date
        run: |
          # This generates a timestamp like what is defined on the ArtifactHub documentation
          # E.G: 2022-02-08T15:38:15Z'
          # https://artifacthub.io/docs/topics/repositories/container-images/
          # https://linux.die.net/man/1/date
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: metadata
        with:
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=raw,value=${{ env.DEFAULT_TAG }}-{{date 'YYYYMMDD'}}
            type=raw,value=latest
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Build Image
        id: build_image
        if: steps.check_compatibility.outputs.should_skip != 'true'
        env:
          META_LABELS: ${{ steps.metadata.outputs.labels }}
        run: |
          set -x

          # Calculate the base image tag. 
          # If DEFAULT_TAG is znver4, BASE_TAG becomes v4. Otherwise, they match.
          MARCH="${{ env.DEFAULT_TAG }}"
          if [ "$MARCH" == "znver4" ]; then
            BASE_TAG="v4"
          else
            BASE_TAG="$MARCH"
          fi

          # get labels from metadata action
          while IFS= read -r label; do
            if [[ -n "$label" ]]; then
              BUILD_ARGS+=("--label" "$label")
            fi
          done <<< "$META_LABELS"

          # Check if the manual 'no_cache' toggle was checked in the GitHub UI
          if [ "${{ github.event.inputs.no_cache }}" == "true" ]; then
            echo "Manual cache bust triggered. Appending --no-cache..."
            BUILD_ARGS+=("--no-cache")
          fi

          sudo podman build "${BUILD_ARGS[@]}" \
            --build-arg TARGET_CPU_MARCH="$MARCH" \
            --build-arg BASE_IMAGE_TAG="$BASE_TAG" \
            --tag "$IMAGE_NAME:$DEFAULT_TAG" .

      - name: Rechunk Image
        if: steps.check_compatibility.outputs.should_skip != 'true'
        run: |
          set -xeuo pipefail

          IMAGE_REF="localhost/${IMAGE_NAME}:${DEFAULT_TAG}"
          ARCHIVE_PATH="${{ github.workspace }}/rechunked_image.tar"

          # Write the chunkah stream to disk to prevent pipe deadlocks and RAM exhaustion
          sudo podman run --rm --network=none --mount=type=image,source=$IMAGE_REF,target=/chunkah \
            -e CHUNKAH_CONFIG_STR="$(sudo podman inspect $IMAGE_REF)" \
            quay.io/jlebon/chunkah build --label containers.bootc=1 --max-layers 256 > "$ARCHIVE_PATH"

          # Load the completed archive back into podman
          sudo podman load -i "$ARCHIVE_PATH" > /tmp/podman_load_output.txt
          
          # Clean up immediately to save disk space
          sudo rm -f "$ARCHIVE_PATH"

          IMAGE_ID=$(cat /tmp/podman_load_output.txt | grep "Loaded image" | awk '{print $3}')
          sudo podman tag "$IMAGE_ID" "$IMAGE_REF"

      - name: Login to GitHub Container Registry
        if: steps.check_compatibility.outputs.should_skip != 'true' && github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOGIN_USER: ${{ github.actor }}
        run: |
          echo "${GITHUB_TOKEN}" | sudo podman login -u "${LOGIN_USER}" --password-stdin "ghcr.io"
          echo "${GITHUB_TOKEN}" | docker login -u "${LOGIN_USER}" --password-stdin "ghcr.io" # For cosign

      - name: Push to GHCR
        if: steps.check_compatibility.outputs.should_skip != 'true' && github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAGS: ${{ steps.metadata.outputs.tags }}
          MAX_RETRIES: 3
        run: |
          set -x
          for tag in $IMAGE_TAGS; do
            for i in $(seq "${MAX_RETRIES}"); do
              # HACK: push twice as a workaround to push rechunk annotations
              sudo podman push --digestfile=/tmp/digestfile "localhost/${IMAGE_NAME}:${DEFAULT_TAG}" "${IMAGE_REGISTRY}/${IMAGE_NAME}:${tag}" || true
              sudo podman push --digestfile=/tmp/digestfile "localhost/${IMAGE_NAME}:${DEFAULT_TAG}" "${IMAGE_REGISTRY}/${IMAGE_NAME}:${tag}" && break || sleep $((5 * i));
            done
          done
          echo "remote_image_digest=$(< /tmp/digestfile)" | tee "${GITHUB_OUTPUT}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0
        if: steps.check_compatibility.outputs.should_skip != 'true' && github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

      - name: Sign container image
        if: steps.check_compatibility.outputs.should_skip != 'true' && github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: cosign sign -y --new-bundle-format=false --use-signing-config=false --key env://COSIGN_PRIVATE_KEY "${IMAGE_REGISTRY}/${IMAGE_NAME}@${REMOTE_IMAGE_DIGEST}"
        env:
          REMOTE_IMAGE_DIGEST: ${{ steps.push.outputs.remote_image_digest }}
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}

      - name: Clean workspace
        if: success() && steps.check_compatibility.outputs.should_skip != 'true'
        run: |
          # Clean up the _work folder to save space, but only on success
          # so we can investigate failures if needed.
          sudo rm -rf ${{ github.workspace }}/*
          sudo rm -rf ${{ github.workspace }}/.[!.]* || true
