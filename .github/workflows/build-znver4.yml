name: Build container image (znver4)
on:
  schedule:
    # 08:30am UTC every other day. Staggered after v3 and v4 builds.
    - cron: "30 08 */2 * *"
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Force a clean build (--no-cache)'
        required: false
        type: boolean
        default: false
      wipe_pkg_cache:
        description: 'Wipe package cache before build'
        required: false
        type: boolean
        default: false

env:
  IMAGE_DESC: "CachyOS BoppOS Bootc image (znver4)"
  IMAGE_KEYWORDS: "bootc,arch,cachyos"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/10499845?s=200&v=4"
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "znver4"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push image (znver4)
    runs-on: znver4

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          # Lowercase the image uri
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Check Compatibility (znver4)
        id: check_compatibility
        run: |
          # Check for AVX512_VNNI (A strong indicator for Zen 4 / znver4 vs older v4 CPUs)
          if ! grep -q avx512_vnni /proc/cpuinfo; then
            echo "::warning::Runner CPU does not support AVX512_VNNI. Skipping znver4 build."
            echo "should_skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Free Disk Space (Self-Hosted)
        run: |
          echo "🧹 Sweeping the runner for free space..."
          
          # 1. Clean up package cache (Apt for Debian/Ubuntu, Pacman for Arch/CachyOS)
          if command -v apt-get &> /dev/null; then
            echo "Detected apt. Cleaning cache..."
            sudo apt-get clean
          elif command -v pacman &> /dev/null; then
            echo "Detected pacman. Cleaning cache..."
            sudo pacman -Scc --noconfirm
          fi
          
          # 2. Nuke leftover /tmp files and orphaned Podman extraction directories
          sudo rm -rf /tmp/chunked_image.tar /tmp/podman_load_output.txt /tmp/tmp.* /var/tmp/container_images_* /var/tmp/podman*
          
          # 3. Prune dangling Podman data AND aggressively wipe the build cache
          sudo podman system prune --force
          sudo podman builder prune -a -f
          
          # 4. Wipe the Podman package cache if the manual UI toggle was checked
          if [ "${{ github.event.inputs.wipe_pkg_cache }}" == "true" ]; then
            echo "Nuking Podman builder cache mount..."
            sudo rm -rf /var/lib/containers/storage/volumes/boppos-builder-cache-*
          fi
          
          echo "📊 Disk space after cleanup:"
          df -h /

      - name: Checkout
        if: steps.check_compatibility.outputs.should_skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get current date
        id: date
        run: |
          # This generates a timestamp like what is defined on the ArtifactHub documentation
          # E.G: 2022-02-08T15:38:15Z'
          # https://artifacthub.io/docs/topics/repositories/container-images/
          # https://linux.die.net/man/1/date
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        if: steps.check_compatibility.outputs.should_skip != 'true'
        id: metadata
        with:
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=raw,value=${{ env.DEFAULT_TAG }}-{{date 'YYYYMMDD'}}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Login to GitHub Container Registry
        if: steps.check_compatibility.outputs.should_skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOGIN_USER: ${{ github.actor }}
        run: |
          echo "${GITHUB_TOKEN}" | sudo podman login -u "${LOGIN_USER}" --password-stdin "ghcr.io"
          echo "${GITHUB_TOKEN}" | docker login -u "${LOGIN_USER}" --password-stdin "ghcr.io" # For cosign

      - name: Build Image
        id: build_image
        if: steps.check_compatibility.outputs.should_skip != 'true'
        env:
          META_LABELS: ${{ steps.metadata.outputs.labels }}
        run: |
          set -x

          # Calculate the base image tag. 
          # If DEFAULT_TAG is znver4, BASE_TAG becomes v4. Otherwise, they match.
          MARCH="${{ env.DEFAULT_TAG }}"
          if [ "$MARCH" == "znver4" ]; then
            BASE_TAG="v4"
          else
            BASE_TAG="$MARCH"
          fi

          # get labels from metadata action
          while IFS= read -r label; do
            if [[ -n "$label" ]]; then
              BUILD_ARGS+=("--label" "$label")
            fi
          done <<< "$META_LABELS"

          # Check if the manual 'no_cache' toggle was checked in the GitHub UI
          if [ "${{ github.event.inputs.no_cache }}" == "true" ]; then
            echo "Manual cache bust triggered. Appending --no-cache..."
            BUILD_ARGS+=("--no-cache")
          fi

          # Check if the manual 'wipe_pkg_cache' toggle was checked in the GitHub UI
          if [ "${{ github.event.inputs.wipe_pkg_cache }}" == "true" ]; then
            echo "Manual wipe package cache triggered. Appending build arg..."
            BUILD_ARGS+=("--build-arg" "WIPE_PKG_CACHE=true")
          fi

          sudo podman build "${BUILD_ARGS[@]}" \
            --network=host \
            --build-arg TARGET_CPU_MARCH="$MARCH" \
            --build-arg BASE_IMAGE_TAG="$BASE_TAG" \
            --tag "$IMAGE_NAME:$DEFAULT_TAG" .

      - name: Rechunk Image
        if: steps.check_compatibility.outputs.should_skip != 'true'
        run: |
          set -xeuo pipefail

          IMAGE_REF="localhost/${IMAGE_NAME}:${DEFAULT_TAG}"
          ARCHIVE_PATH="${{ github.workspace }}/rechunked_image.tar"

          # Write the chunkah stream to disk to prevent pipe deadlocks and RAM exhaustion
          sudo podman run --rm --network=none --mount=type=image,source=$IMAGE_REF,target=/chunkah \
            -e CHUNKAH_CONFIG_STR="$(sudo podman inspect $IMAGE_REF)" \
            quay.io/coreos/chunkah build --compressed --compression-level 2 --label containers.bootc=1 --max-layers 256 --prune /var/cache/ --prune /var/log/ --prune /tmp/ --prune /var/tmp/ > "$ARCHIVE_PATH"

          # THE BATON PASS: Delete the massive unchunked image from Podman!
          echo "Freeing space: Deleting the original unchunked image from Podman..."
          sudo podman rmi -f "$IMAGE_REF"
          
          # Quick prune to flush the deleted layers from the storage graph
          sudo podman system prune -f

          # Load the completed archive back into podman
          sudo podman load -i "$ARCHIVE_PATH" > /tmp/podman_load_output.txt
          
          # Clean up immediately to save disk space
          sudo rm -f "$ARCHIVE_PATH"

          IMAGE_ID=$(cat /tmp/podman_load_output.txt | grep "Loaded image" | awk '{print $3}')
          sudo podman tag "$IMAGE_ID" "$IMAGE_REF"

      - name: Push to GHCR
        if: steps.check_compatibility.outputs.should_skip != 'true' && github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAGS: ${{ steps.metadata.outputs.tags }}
          MAX_RETRIES: 3
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          for tag in $IMAGE_TAGS; do
            for i in $(seq "${MAX_RETRIES}"); do
              sudo podman push --digestfile=/tmp/push_digest.txt "localhost/${IMAGE_NAME}:${DEFAULT_TAG}" "${IMAGE_REGISTRY}/${IMAGE_NAME}:${tag}" && break || sleep $((5 * i));
            done
          done
          
          # Fetch the exact remote digest directly from Podman's push output
          REMOTE_DIGEST=$(sudo cat /tmp/push_digest.txt)
          echo "Captured remote digest: $REMOTE_DIGEST"
          echo "remote_image_digest=${REMOTE_DIGEST}" >> "${GITHUB_OUTPUT}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0
        if: steps.check_compatibility.outputs.should_skip != 'true' && github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          cosign-release: 'v2.6.1'

      - name: Sign container image
        if: steps.check_compatibility.outputs.should_skip != 'true' && github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: cosign sign -y --key env://COSIGN_PRIVATE_KEY "${IMAGE_REGISTRY}/${IMAGE_NAME}@${REMOTE_IMAGE_DIGEST}"
        env:
          REMOTE_IMAGE_DIGEST: ${{ steps.push.outputs.remote_image_digest }}
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}

      - name: Clean Workspace & Podman Storage
        if: always()
        run: |
          echo "🧹 Sweeping up the heavy Podman assets..."
          
          # 1. Obliterate orphaned Podman extraction directories (The 128GB Silent Killer)
          sudo rm -rf /var/tmp/container_images_* /var/tmp/podman*
          
          # 2. Delete the massive chunkah tarballs
          sudo rm -f /tmp/chunked_image.tar /tmp/podman_load_output.txt
          
          # 3. Prune dangling (<none>) images AND the intermediate build cache
          sudo podman image prune --force
          sudo podman builder prune -a -f
          
          # 4. Handle the GitHub workspace based on job status
          if [ "${{ job.status }}" == "success" ]; then
            echo "✨ Build succeeded. Wiping workspace source files..."
            sudo rm -rf ${{ github.workspace }}/*
            sudo rm -rf ${{ github.workspace }}/.[!.]* || true
          else
            echo "⚠️ Build failed. Leaving workspace source files intact for debugging."
          fi
          
          echo "📊 Final Disk Space:"
          df -h /