name: Build container image (znver4)
on:
  schedule:
    # 08:30am UTC every other day. Staggered after v3 and v4 builds.
    - cron: "30 09 */2 * *"
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Force a clean build (--no-cache)'
        required: false
        type: boolean
        default: false
      wipe_pkg_cache:
        description: 'Wipe package cache before build'
        required: false
        type: boolean
        default: false
      test_tag:
        description: 'Append -test to the image tag'
        required: false
        type: boolean
        default: false
      unconfined_build:
        description: 'Disable seccomp profile (--security-opt seccomp=unconfined)'
        required: false
        type: boolean
        default: false
      build_plasma:
        description: 'Build Plasma flavor'
        required: false
        type: boolean
        default: true
      build_gnome:
        description: 'Build GNOME flavor'
        required: false
        type: boolean
        default: true
      build_niri:
        description: 'Build Niri flavor'
        required: false
        type: boolean
        default: true

env:
  IMAGE_DESC: "CachyOS BoppOS Bootc image (znver4)"
  IMAGE_KEYWORDS: "bootc,arch,cachyos"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/267760384?s=200&v=4"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "${{ inputs.test_tag && 'znver4-test' || 'znver4' }}"
  FLAVORS: "plasma gnome niri"
  BASE_TAG: "v4"
  TARGET_MARCH: "znver4"

concurrency:
  group: boppos-build-queue
  cancel-in-progress: false

jobs:
  build_base:
    name: Build base image (znver4)
    runs-on: znver4
    outputs:
      should_skip: ${{ steps.check_compatibility.outputs.should_skip }}
      flavors: ${{ steps.set_flavors.outputs.flavors }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          # Lowercase the image uri
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}

      - name: Check Compatibility (znver4)
        id: check_compatibility
        run: |
          # Check for AVX512_VNNI (A strong indicator for Zen 4 / znver4 vs older v4 CPUs)
          if ! grep -q avx512_vnni /proc/cpuinfo; then
            echo "::warning::Runner CPU does not support AVX512_VNNI. Skipping znver4 build."
            echo "should_skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Determine Target Flavors
        id: set_flavors
        run: |
          if [ "${{ steps.check_compatibility.outputs.should_skip }}" == "true" ]; then
            echo "flavors=[]" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "flavors=[\"plasma\", \"gnome\", \"niri\"]" >> $GITHUB_OUTPUT
          else
            FLAVORS=()
            [ "${{ inputs.build_plasma }}" == "true" ] && FLAVORS+=('"plasma"')
            [ "${{ inputs.build_gnome }}" == "true" ] && FLAVORS+=('"gnome"')
            [ "${{ inputs.build_niri }}" == "true" ] && FLAVORS+=('"niri"')
            JOINED=$(IFS=, ; echo "${FLAVORS[*]}")
            echo "flavors=[$JOINED]" >> $GITHUB_OUTPUT
          fi

      - name: Free Disk Space (Self-Hosted)
        run: |
          echo "🧹 Sweeping the runner for free space..."
          
          # 1. Clean up package cache (Apt for Debian/Ubuntu, Pacman for Arch/CachyOS)
          if command -v apt-get &> /dev/null; then
            echo "Detected apt. Cleaning cache..."
            sudo apt-get clean
          elif command -v pacman &> /dev/null; then
            echo "Detected pacman. Cleaning cache..."
            sudo pacman -Scc --noconfirm
          fi
          
          # 2. Nuke leftover /tmp files and orphaned Podman extraction directories
          sudo rm -rf /tmp/tmp.* /var/tmp/container_images_* /var/tmp/podman* /var/tmp/cachyos-base-*.tar /var/tmp/stereoscope-* /var/tmp/sbom-*
          
          # Ensure local base tags are cleared at the very beginning of a new pipeline run
          sudo podman rmi -f "localhost/aur-builder:${{ env.TARGET_MARCH }}" 2>/dev/null || true
          sudo podman rmi -f "localhost/cachyos-base:${{ env.DEFAULT_TAG }}" 2>/dev/null || true
          sudo podman rmi -f "${{ env.IMAGE_REGISTRY }}/cachyos-base:${{ env.DEFAULT_TAG }}" 2>/dev/null || true
          
          # 3. Prune dangling Podman data (Preserve recent build cache for speed)
          sudo podman system prune --force
          sudo podman image prune --all --force --filter "until=72h"
          
          # 4. Wipe the Podman package cache if the manual UI toggle was checked
          if [ "${{ github.event.inputs.wipe_pkg_cache }}" == "true" ]; then
            echo "Nuking Podman builder cache mount..."
            sudo rm -rf /var/lib/containers/storage/volumes/boppos-builder-cache-*
            sudo podman system prune --all --force --volumes --build
          fi
          
          # 5. Clean leftover root-owned workspace files from previous runs to prevent checkout permission errors
          echo "Nuking leftover workspace files..."
          sudo rm -rf ${{ github.workspace }}/* ${{ github.workspace }}/.[!.]* 2>/dev/null || true
          
          echo "📊 Disk space after cleanup:"
          df -h /

      - name: Checkout
        if: steps.check_compatibility.outputs.should_skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Update AUR Submodules
        if: steps.check_compatibility.outputs.should_skip != 'true'
        run: |
          git submodule update --remote -- files/aur/pkgbuilds/ || true

      - name: Ensure Package Intervals JSON exists
        if: steps.check_compatibility.outputs.should_skip != 'true'
        run: |
          if [ ! -f scripts/package-intervals.json ]; then echo "{}" > scripts/package-intervals.json; fi

      - name: Get current date
        id: date
        run: |
          # This generates a timestamp like what is defined on the ArtifactHub documentation
          # E.G: 2022-02-08T15:38:15Z'
          # https://artifacthub.io/docs/topics/repositories/container-images/
          # https://linux.die.net/man/1/date
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        if: steps.check_compatibility.outputs.should_skip != 'true'
        id: metadata
        with:
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=raw,value=${{ env.DEFAULT_TAG }}-{{date 'YYYYMMDD'}}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}
            org.opencontainers.image.title=cachyos
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Login to GitHub Container Registry
        if: steps.check_compatibility.outputs.should_skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOGIN_USER: ${{ github.actor }}
        run: |
          echo "${GITHUB_TOKEN}" | sudo podman login -u "${LOGIN_USER}" --password-stdin "ghcr.io"
          echo "${GITHUB_TOKEN}" | docker login -u "${LOGIN_USER}" --password-stdin "ghcr.io" # For cosign

      - name: Prepare Local Cache Directory
        run: |
          CACHE_DIR="/opt/boppos-pkg-cache/${{ env.DEFAULT_TAG }}"
          sudo mkdir -p "$CACHE_DIR"
          sudo chown -R $USER:$USER "$CACHE_DIR"
          
          # Delete problematic lua packages and incomplete downloads before build
          sudo rm -f "$CACHE_DIR"/lua* "$CACHE_DIR"/*.part
          
          # If the manual wipe toggle was checked, clear the cache
          if [ "${{ github.event.inputs.wipe_pkg_cache }}" == "true" ]; then
            echo "Manual wipe triggered. Clearing local pacman cache..."
            sudo rm -rf "$CACHE_DIR"/*
          fi
          
          echo "LOCAL_CACHE_DIR=$CACHE_DIR" >> $GITHUB_ENV

      - name: Generate Fastest Mirrors
        if: steps.check_compatibility.outputs.should_skip != 'true'
        run: |
          echo "::group::Generating fastest mirrors"
          mkdir -p ${{ github.workspace }}/mirrors
          PODMAN_OPTS=""
          if [ "${{ github.event.inputs.unconfined_build }}" == "true" ]; then PODMAN_OPTS="--security-opt seccomp=unconfined"; fi
          sudo podman run $PODMAN_OPTS --rm --network=host -v ${{ github.workspace }}/mirrors:/workspace-mirrors:z docker.io/cachyos/cachyos-v4:latest bash -c "timeout 120 bash -c 'pacman -Sy --noconfirm cachyos-rate-mirrors < /dev/null && cachyos-rate-mirrors < /dev/null' || echo 'Mirror rating timed out or failed, falling back to defaults'; cp /etc/pacman.d/cachyos-mirrorlist /workspace-mirrors/ && cp /etc/pacman.d/cachyos-v3-mirrorlist /workspace-mirrors/ && cp /etc/pacman.d/cachyos-v4-mirrorlist /workspace-mirrors/"
          echo "::endgroup::"

      - name: Build AUR Image
        id: build_aur
        if: steps.check_compatibility.outputs.should_skip != 'true'
        run: |
          set -x
          MARCH="${{ env.TARGET_MARCH }}"

          PODMAN_OPTS=""
          if [ "${{ github.event.inputs.unconfined_build }}" == "true" ]; then PODMAN_OPTS="--security-opt seccomp=unconfined"; fi

          echo "::group::Building AUR builder"
          sudo podman build $PODMAN_OPTS -v "${{ env.LOCAL_CACHE_DIR }}:/var/cache/pacman/pkg:z" \
            --build-arg BASE_IMAGE_TAG=${{ env.BASE_TAG }} \
            --build-arg TARGET_CPU_MARCH=$MARCH \
            --network=host \
            --tag "localhost/aur-builder:$MARCH" -f "Containerfile.aur" .
          echo "::endgroup::"

      - name: Build Base Image
        id: build_base
        if: steps.check_compatibility.outputs.should_skip != 'true'
        env:
          META_LABELS: ${{ steps.metadata.outputs.labels }}
        run: |
          set -x

          MARCH="${{ env.TARGET_MARCH }}"

          # get labels from metadata action
          while IFS= read -r label; do
            if [[ -n "$label" ]]; then
              BUILD_ARGS+=("--label" "$label")
            fi
          done <<< "$META_LABELS"

          BUILD_ARGS+=("-v" "${{ env.LOCAL_CACHE_DIR }}:/usr/lib/sysimage/cache/pacman/pkg:z")
          
          # Check if the manual 'no_cache' toggle was checked in the GitHub UI
          if [ "${{ github.event.inputs.no_cache }}" == "true" ]; then
            echo "Manual cache bust triggered. Appending --no-cache..."
            BUILD_ARGS+=("--no-cache")
          fi

          # Check if the manual 'wipe_pkg_cache' toggle was checked in the GitHub UI
          if [ "${{ github.event.inputs.wipe_pkg_cache }}" == "true" ]; then
            echo "Manual wipe package cache triggered. Appending build arg..."
            BUILD_ARGS+=("--build-arg" "WIPE_PKG_CACHE=true")
          fi

          if [ "${{ github.event.inputs.unconfined_build }}" == "true" ]; then
            echo "Manual unconfined build triggered. Appending --security-opt seccomp=unconfined..."
            BUILD_ARGS+=("--security-opt" "seccomp=unconfined")
          fi

          echo "::group::Building base"
          CURRENT_IMAGE_NAME="cachyos-base"
          DOCKERFILE="Containerfile.base"
          FLAVOR_ARGS=("--build-arg" "BASE_IMAGE_TAG=${{ env.BASE_TAG }}" "--build-arg" "TARGET_CPU_MARCH=$MARCH")

          sudo podman build "${BUILD_ARGS[@]}" "${FLAVOR_ARGS[@]}" \
            --network=host \
            --tag "localhost/$CURRENT_IMAGE_NAME:$DEFAULT_TAG" -f "$DOCKERFILE" .

          # Ensure the local base image is tagged properly so the DE overlays can layer onto it!
          sudo podman tag "localhost/$CURRENT_IMAGE_NAME:$DEFAULT_TAG" "${IMAGE_REGISTRY}/${CURRENT_IMAGE_NAME}:${DEFAULT_TAG}"
          echo "::endgroup::"

      - name: Prune Pacman Cache
        if: steps.check_compatibility.outputs.should_skip != 'true' && github.event_name != 'pull_request'
        run: |
          if [ ! -d "${{ env.LOCAL_CACHE_DIR }}" ] || [ -z "$(ls -A ${{ env.LOCAL_CACHE_DIR }})" ]; then
            echo "Cache directory is empty or does not exist, skipping prune."
            exit 0
          fi
          echo "🧹 Pruning pacman cache to manage size..."
          echo "Cache size before pruning:"
          du -sh ${{ env.LOCAL_CACHE_DIR }}

          # Determine the correct CachyOS base image to reuse for pruning
          PRUNE_IMAGE="docker.io/cachyos/cachyos-${{ env.BASE_TAG }}"

          PODMAN_OPTS=""
          if [ "${{ github.event.inputs.unconfined_build }}" == "true" ]; then PODMAN_OPTS="--security-opt seccomp=unconfined"; fi

          # Isolate the host cache mount to prevent PGP/keyring conflicts when installing pacman-contrib
          sudo podman run $PODMAN_OPTS --rm --network=host -v ${{ env.LOCAL_CACHE_DIR }}:/host-cache:z \
            $PRUNE_IMAGE \
            bash -c "pacman -Sy --noconfirm archlinux-keyring cachyos-keyring && pacman -S --noconfirm pacman-contrib && paccache -c /host-cache -rk1"
            
          # Ensure problematic packages are purged after pruning too
          sudo rm -f ${{ env.LOCAL_CACHE_DIR }}/lua* ${{ env.LOCAL_CACHE_DIR }}/*.part

          echo "Cache size after pruning:"
          du -sh ${{ env.LOCAL_CACHE_DIR }}

      - name: Clean Workspace & Podman Storage
        if: always()
        run: |
          echo "🧹 Sweeping up the heavy Podman assets..."
          
          # 1. Force stop and remove any leftover containers from cancelled runs
          sudo podman rm -af || true
          
          # 2. Prune dangling (<none>) images but preserve the tagged base image
          sudo podman system prune --force --volumes || true
          
          # 3. Obliterate orphaned Podman extraction directories (The 128GB Silent Killer)
          sudo rm -rf /var/tmp/container_images_* /var/tmp/podman* /var/tmp/stereoscope-* /var/tmp/sbom-*
          
          # 4. Delete the massive chunkah tarballs
          sudo rm -rf /tmp/chunked_image.tar /tmp/podman_load_output.txt ${{ github.workspace }}/rechunked_*
          
          # 5. Handle the GitHub workspace based on job status
          if [ "${{ job.status }}" == "success" ]; then
            echo "✨ Build succeeded. Wiping workspace source files..."
            sudo rm -rf ${{ github.workspace }}/* ${{ github.workspace }}/.[!.]* 2>/dev/null || true
          else
            echo "⚠️ Build failed. Leaving workspace source files intact for debugging."
          fi
          
          echo "📊 Final Disk Space:"
          df -h /

  build_flavors:
    name: Build ${{ matrix.flavor }} (znver4)
    needs: build_base
    if: needs.build_base.outputs.should_skip != 'true' && needs.build_base.outputs.flavors != '[]'
    runs-on: znver4
    strategy:
      fail-fast: false
      matrix:
        flavor: ${{ fromJson(needs.build_base.outputs.flavors) }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Ensure Package Intervals JSON exists
        run: |
          if [ ! -f scripts/package-intervals.json ]; then echo "{}" > scripts/package-intervals.json; fi

      - name: Get current date
        id: date
        run: |
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: metadata
        with:
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=raw,value=${{ env.DEFAULT_TAG }}-{{date 'YYYYMMDD'}}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}
            org.opencontainers.image.title=cachyos
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Login to GitHub Container Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOGIN_USER: ${{ github.actor }}
        run: |
          echo "${GITHUB_TOKEN}" | sudo podman login -u "${LOGIN_USER}" --password-stdin "ghcr.io"
          echo "${GITHUB_TOKEN}" | docker login -u "${LOGIN_USER}" --password-stdin "ghcr.io"

      - name: Prepare Local Cache Directory
        run: |
          CACHE_DIR="/opt/boppos-pkg-cache/${{ env.DEFAULT_TAG }}"
          sudo mkdir -p "$CACHE_DIR"
          sudo chown -R $USER:$USER "$CACHE_DIR"
          sudo rm -f "$CACHE_DIR"/lua* "$CACHE_DIR"/*.part
          if [ "${{ github.event.inputs.wipe_pkg_cache }}" == "true" ]; then sudo rm -rf "$CACHE_DIR"/*; fi
          echo "LOCAL_CACHE_DIR=$CACHE_DIR" >> $GITHUB_ENV

      - name: Build Flavor Image
        env:
          META_LABELS: ${{ steps.metadata.outputs.labels }}
        run: |
          set -x
          while IFS= read -r label; do
            if [[ -n "$label" ]]; then BUILD_ARGS+=("--label" "$label"); fi
          done <<< "$META_LABELS"

          if [ "${{ github.event.inputs.no_cache }}" == "true" ]; then BUILD_ARGS+=("--no-cache"); fi
          if [ "${{ github.event.inputs.wipe_pkg_cache }}" == "true" ]; then BUILD_ARGS+=("--build-arg" "WIPE_PKG_CACHE=true"); fi
          if [ "${{ github.event.inputs.unconfined_build }}" == "true" ]; then BUILD_ARGS+=("--security-opt" "seccomp=unconfined"); fi
          BUILD_ARGS+=("-v" "${{ env.LOCAL_CACHE_DIR }}:/usr/lib/sysimage/cache/pacman/pkg:z")
          
          FLAVOR="${{ matrix.flavor }}"
          echo "::group::Building $FLAVOR"
          CURRENT_IMAGE_NAME="cachyos-${FLAVOR}"
          DOCKERFILE="Containerfile.${FLAVOR}"
          FLAVOR_ARGS=("--build-arg" "BASE_IMAGE_TAG=$DEFAULT_TAG")

          sudo podman build "${BUILD_ARGS[@]}" "${FLAVOR_ARGS[@]}" --network=host --tag "localhost/$CURRENT_IMAGE_NAME:$DEFAULT_TAG" -f "$DOCKERFILE" .
          echo "::endgroup::"

      - name: Extract Package List
        if: github.event_name != 'pull_request'
        run: |
          echo "Extracting package list from image..."
          PODMAN_OPTS=""
          if [ "${{ github.event.inputs.unconfined_build }}" == "true" ]; then PODMAN_OPTS="--security-opt seccomp=unconfined"; fi
          CONTAINER_ID=$(sudo podman create $PODMAN_OPTS localhost/cachyos-${{ matrix.flavor }}:${{ env.DEFAULT_TAG }})
          sudo podman cp ${CONTAINER_ID}:/usr/share/boppos/packages.json packages-${{ matrix.flavor }}-${{ github.sha }}.json
          sudo podman rm ${CONTAINER_ID}

      - name: Rechunk Flavor Image (PR Dry Run)
        if: github.event_name == 'pull_request'
        run: |
          set -ex
          FLAVOR="${{ matrix.flavor }}"
          CURRENT_IMAGE_NAME="cachyos-${FLAVOR}"
          IMAGE_REF="localhost/${CURRENT_IMAGE_NAME}:${DEFAULT_TAG}"
          
          PODMAN_OPTS=""
          if [ "${{ github.event.inputs.unconfined_build }}" == "true" ]; then PODMAN_OPTS="--security-opt seccomp=unconfined"; fi
          
          echo "Rechunking $FLAVOR (PR Dry Run)..."
          sudo podman run $PODMAN_OPTS --rm --network=none \
            --mount=type=image,source=$IMAGE_REF,target=/chunkah \
            -e SOURCE_DATE_EPOCH=0 \
            -e CHUNKAH_CONFIG_STR="$(sudo podman inspect $IMAGE_REF)" \
            quay.io/coreos/chunkah build --label containers.bootc=1 --max-layers 400 --prune /var/cache/ --prune /var/log/ --prune /tmp/ --prune /var/tmp/ > /dev/null

      - name: Rechunk & Push Flavor Image to GHCR
        if: github.event_name != 'pull_request'
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_TAGS: ${{ steps.metadata.outputs.tags }}
          MAX_RETRIES: 3
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -ex
          FLAVOR="${{ matrix.flavor }}"
          CURRENT_IMAGE_NAME="cachyos-${FLAVOR}"
          IMAGE_REF="localhost/${CURRENT_IMAGE_NAME}:${DEFAULT_TAG}"
          DEFAULT_DEST="docker://${IMAGE_REGISTRY}/${CURRENT_IMAGE_NAME}:${DEFAULT_TAG}"
          
          PODMAN_OPTS=""
          if [ "${{ github.event.inputs.unconfined_build }}" == "true" ]; then PODMAN_OPTS="--security-opt seccomp=unconfined"; fi
          
          export CHUNKAH_CONFIG_STR="$(sudo podman inspect $IMAGE_REF)"
          export PODMAN_OPTS
          export IMAGE_REF
          export DEFAULT_DEST
          
          echo "::group::Rechunking and Pushing $FLAVOR directly to registry"
          SUCCESS=false
          
          FIFO_DIR=$(mktemp -d)
          FIFO_PATH="$FIFO_DIR/chunkah.tar"
          mkfifo "$FIFO_PATH"
          
          for i in $(seq "${MAX_RETRIES}"); do
            echo "Attempt $i: Building and streaming directly to registry via FIFO..."
            
            sudo podman run $PODMAN_OPTS --rm --network=none \
                --mount=type=image,source=$IMAGE_REF,target=/chunkah \
                -e SOURCE_DATE_EPOCH=0 \
                -e CHUNKAH_CONFIG_STR="$CHUNKAH_CONFIG_STR" \
                quay.io/coreos/chunkah build --label containers.bootc=1 --max-layers 400 --prune /var/cache/ --prune /var/log/ --prune /tmp/ --prune /var/tmp/ > "$FIFO_PATH" &
            PODMAN_PID=$!
            
            if sudo skopeo copy \
                --dest-compress-format zstd:chunked \
                --dest-compress-level 6 \
                "oci-archive:$FIFO_PATH" \
                "$DEFAULT_DEST"; then
              SUCCESS=true
              wait $PODMAN_PID || true
              break
            fi
            
            sudo kill $PODMAN_PID 2>/dev/null || true
            wait $PODMAN_PID 2>/dev/null || true
            echo "Push failed, retrying in $((5 * i)) seconds..."; sleep $((5 * i))
          done
          
          rm -rf "$FIFO_DIR"
          
          if [ "$SUCCESS" = "false" ]; then exit 1; fi
          
          for tag in $IMAGE_TAGS; do
            if [ "$tag" != "${DEFAULT_TAG}" ]; then
              DEST_IMAGE="docker://${IMAGE_REGISTRY}/${CURRENT_IMAGE_NAME}:${tag}"
              sudo skopeo copy "$DEFAULT_DEST" "$DEST_IMAGE"
            fi
          done
          echo "::endgroup::"

          SUCCESS_DIGEST=false
          for i in $(seq "${MAX_RETRIES}"); do
            if REMOTE_DIGEST=$(skopeo inspect --creds="${{ github.actor }}:${GITHUB_TOKEN}" --format '{{.Digest}}' "docker://${IMAGE_REGISTRY}/${CURRENT_IMAGE_NAME}:${DEFAULT_TAG}"); then SUCCESS_DIGEST=true; break; fi
            echo "Failed to fetch remote digest, retrying..."; sleep $((5 * i))
          done
          if [ "$SUCCESS_DIGEST" = "false" ]; then exit 1; fi
          echo "${CURRENT_IMAGE_NAME}=${REMOTE_DIGEST}" >> digests.env

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: github.event_name != 'pull_request'

      - name: Attach SBOM and Sign container image
        if: github.event_name != 'pull_request'
        run: |
          while IFS='=' read -r img digest; do
            cosign attach sbom --sbom packages-${{ matrix.flavor }}-${{ github.sha }}.json "${IMAGE_REGISTRY}/${img}:${DEFAULT_TAG}@${digest}"
            cosign sign -y --new-bundle-format=false --use-signing-config=false --key env://COSIGN_PRIVATE_KEY "${IMAGE_REGISTRY}/${img}:${DEFAULT_TAG}@${digest}" < /dev/null
          done < digests.env
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          COSIGN_PASSWORD: ""

      - name: Cleanup Flavor Assets
        if: always()
        run: |
          echo "🧹 Cleaning up flavor-specific residual files..."
          sudo rm -f packages-${{ matrix.flavor }}-${{ github.sha }}.json digests.env
          sudo podman rmi -f "localhost/cachyos-${{ matrix.flavor }}:${{ env.DEFAULT_TAG }}" 2>/dev/null || true
          sudo podman rmi -f "${IMAGE_REGISTRY}/cachyos-${{ matrix.flavor }}:${{ env.DEFAULT_TAG }}" 2>/dev/null || true
          sudo rm -rf ${{ github.workspace }}/* ${{ github.workspace }}/.[!.]* 2>/dev/null || true

  cleanup:
    name: Cleanup Runner Workspace (znver4)
    needs: [build_base, build_flavors]
    if: always() && needs.build_base.outputs.should_skip != 'true'
    runs-on: znver4
    steps:
      - name: Clean Workspace & Podman Storage
        run: |
          echo "🧹 Sweeping up the heavy Podman assets..."
          sudo podman rm -af || true
          sudo podman system prune --force || true
          sudo rm -rf /var/tmp/container_images_* /var/tmp/podman* /var/tmp/stereoscope-* /var/tmp/sbom-*
          sudo rm -rf /tmp/chunked_image.tar /tmp/podman_load_output.txt ${{ github.workspace }}/rechunked_*
          if [ "${{ needs.build_flavors.result }}" == "success" ]; then
            echo "✨ All flavors built successfully. Removing local base images and workspace..."
            sudo podman rmi -f "localhost/aur-builder:${{ env.TARGET_MARCH }}" 2>/dev/null || true
            sudo podman rmi -f "localhost/cachyos-base:${{ env.DEFAULT_TAG }}" 2>/dev/null || true
            sudo podman rmi -f "${{ env.IMAGE_REGISTRY }}/cachyos-base:${{ env.DEFAULT_TAG }}" 2>/dev/null || true
            sudo rm -rf ${{ github.workspace }}/* ${{ github.workspace }}/.[!.]* || true
          else
            echo "⚠️ Some flavors failed. Preserving base image and workspace for partial re-runs."
          fi
          df -h /