name: Update Package Intervals

on:
  push:
    branches: [ "*" ] # Temporary trigger for testing on branches
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sundays
  workflow_dispatch:
    inputs:
      max_age:
        description: 'Max age for cached entries in days'
        required: false
        default: '30'

jobs:
  update-intervals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install aiohttp beautifulsoup4

      - name: Restore Package Intervals Cache
        uses: actions/cache/restore@v4
        with:
          path: scripts/package-intervals.json
          key: pkg-intervals-latest
          restore-keys: |
            pkg-intervals-

      - name: Generate Package Lists from All Images
        run: |
          mkdir -p build
          touch build/all-packages-temp.txt build/cachyos-packages-temp.txt build/aur-packages-temp.txt
          
          # Spin up the latest version of every image flavor to build a master superset of packages
          for FLAVOR in base plasma gnome niri; do
            echo "Extracting packages from cachyos-${FLAVOR}:v3..."
            docker run --rm -v ${{ github.workspace }}/scripts:/scripts:ro -v ${{ github.workspace }}/build:/build:rw ghcr.io/${{ github.repository_owner }}/cachyos-${FLAVOR}:v3 bash -c "/scripts/generate-package-list.sh"
            
            cat build/all-packages.txt >> build/all-packages-temp.txt
            cat build/cachyos-packages.txt >> build/cachyos-packages-temp.txt
            cat build/aur-packages.txt >> build/aur-packages-temp.txt
          done
          
          sort -u build/all-packages-temp.txt > build/all-packages.txt
          sort -u build/cachyos-packages-temp.txt > build/cachyos-packages.txt
          sort -u build/aur-packages-temp.txt > build/aur-packages.txt

      - name: Fetch and Calculate Chunkah Intervals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat build/all-packages.txt | python scripts/fetch-update-intervals.py \
            --cachyos-packages build/cachyos-packages.txt \
            --aur-packages build/aur-packages.txt \
            --cache-file scripts/package-intervals.json \
            --max-age-days ${{ github.event.inputs.max_age || '30' }} \
            --concurrency 10

      - name: Save Package Intervals to Cache
        uses: actions/cache/save@v4
        with:
          path: scripts/package-intervals.json
          key: pkg-intervals-${{ hashFiles('scripts/package-intervals.json') }}